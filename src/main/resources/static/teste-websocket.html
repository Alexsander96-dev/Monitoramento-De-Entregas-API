<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste WebSocket - Monitoramento de Entregas</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        .status {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            background: #eeeeee;
            font-weight: bold;
        }

        .status.conectado {
            background: #dff5e5;
            color: #176b32;
        }

        .status.desconectado {
            background: #fde2e2;
            color: #8b1e1e;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .campo-completo {
            grid-column: 1 / -1;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #c8c8c8;
            border-radius: 6px;
            font-size: 15px;
        }

        .botoes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            padding: 10px 16px;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .principal {
            background: #1565c0;
            color: white;
        }

        .secundario {
            background: #455a64;
            color: white;
        }

        .perigo {
            background: #c62828;
            color: white;
        }

        #log {
            min-height: 220px;
            max-height: 360px;
            overflow-y: auto;
            padding: 14px;
            border-radius: 8px;
            background: #111827;
            color: #d1fae5;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .campo-completo {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Teste WebSocket — Monitoramento de Entregas</h1>

    <div id="status" class="status desconectado">Desconectado</div>

    <div class="grid">
        <div class="campo campo-completo">
            <label for="servidor">Servidor SockJS</label>
            <input id="servidor" value="http://localhost:8080/ws">
        </div>

        <div class="campo">
            <label for="entregaId">ID da entrega</label>
            <input id="entregaId" type="number" min="1" value="1">
        </div>

        <div class="campo">
            <label for="latitude">Latitude</label>
            <input id="latitude" value="-23.5505">
        </div>

        <div class="campo">
            <label for="longitude">Longitude</label>
            <input id="longitude" value="-46.6333">
        </div>
    </div>

    <div class="botoes">
        <button class="principal" id="btnConectar" onclick="conectar()">Conectar</button>
        <button class="secundario" id="btnInscrever" onclick="inscrever()" disabled>
            Inscrever na entrega
        </button>
        <button class="principal" id="btnEnviar" onclick="enviarLocalizacao()" disabled>
            Enviar localização
        </button>
        <button class="perigo" id="btnDesconectar" onclick="desconectar()" disabled>
            Desconectar
        </button>
    </div>

    <h2>Mensagens</h2>
    <div id="log">Aguardando conexão...</div>
</div>

<script>
    let clienteStomp = null;
    let inscricaoAtual = null;

    function registrarLog(mensagem, objeto) {
        const log = document.getElementById("log");
        const horario = new Date().toLocaleTimeString();

        let texto = `[${horario}] ${mensagem}`;

        if (objeto !== undefined) {
            texto += "\n" + JSON.stringify(objeto, null, 2);
        }

        log.textContent += "\n\n" + texto;
        log.scrollTop = log.scrollHeight;
    }

    function atualizarEstado(conectado) {
        const status = document.getElementById("status");

        status.textContent = conectado ? "Conectado ao WebSocket" : "Desconectado";
        status.className = conectado
            ? "status conectado"
            : "status desconectado";

        document.getElementById("btnConectar").disabled = conectado;
        document.getElementById("btnInscrever").disabled = !conectado;
        document.getElementById("btnEnviar").disabled = !conectado;
        document.getElementById("btnDesconectar").disabled = !conectado;
    }

    function conectar() {
        const servidor = document.getElementById("servidor").value.trim();

        if (!servidor) {
            registrarLog("Informe o endereço do servidor.");
            return;
        }

        clienteStomp = new StompJs.Client({
            webSocketFactory: () => new SockJS(servidor),
            reconnectDelay: 5000,
            debug: mensagem => console.log(mensagem),

            onConnect: () => {
                atualizarEstado(true);
                registrarLog("Conexão STOMP realizada com sucesso.");
            },

            onStompError: frame => {
                registrarLog("Erro retornado pelo broker:", {
                    mensagem: frame.headers["message"],
                    corpo: frame.body
                });
            },

            onWebSocketError: erro => {
                registrarLog("Erro na conexão WebSocket:", {
                    mensagem: erro.message || "Erro desconhecido"
                });
            },

            onDisconnect: () => {
                atualizarEstado(false);
                registrarLog("Sessão STOMP encerrada.");
            }
        });

        registrarLog(`Tentando conectar em ${servidor}...`);
        clienteStomp.activate();
    }

    function inscrever() {
        if (!clienteStomp || !clienteStomp.connected) {
            registrarLog("Conecte-se antes de fazer a inscrição.");
            return;
        }

        const entregaId = document.getElementById("entregaId").value.trim();

        if (!entregaId) {
            registrarLog("Informe o ID da entrega.");
            return;
        }

        if (inscricaoAtual) {
            inscricaoAtual.unsubscribe();
            inscricaoAtual = null;
        }

        const destino = `/topic/entregas/${entregaId}`;

        inscricaoAtual = clienteStomp.subscribe(destino, mensagem => {
            try {
                const localizacao = JSON.parse(mensagem.body);
                registrarLog(`Localização recebida de ${destino}:`, localizacao);
            } catch (erro) {
                registrarLog(`Mensagem recebida de ${destino}: ${mensagem.body}`);
            }
        });

        registrarLog(`Inscrito em ${destino}.`);
    }

    function enviarLocalizacao() {
        if (!clienteStomp || !clienteStomp.connected) {
            registrarLog("Conecte-se antes de enviar uma localização.");
            return;
        }

        const entregaId = document.getElementById("entregaId").value.trim();
        const latitude = document.getElementById("latitude").value.trim();
        const longitude = document.getElementById("longitude").value.trim();

        if (!entregaId || !latitude || !longitude) {
            registrarLog("Preencha o ID da entrega, a latitude e a longitude.");
            return;
        }

        const destino = `/app/entregas/${entregaId}/localizacao`;
        const corpo = { latitude, longitude };

        clienteStomp.publish({
            destination: destino,
            body: JSON.stringify(corpo)
        });

        registrarLog(`Localização enviada para ${destino}:`, corpo);
    }

    async function desconectar() {
        if (inscricaoAtual) {
            inscricaoAtual.unsubscribe();
            inscricaoAtual = null;
        }

        if (clienteStomp) {
            await clienteStomp.deactivate();
            clienteStomp = null;
        }

        atualizarEstado(false);
        registrarLog("Desconectado manualmente.");
    }

    window.addEventListener("beforeunload", () => {
        if (clienteStomp) {
            clienteStomp.deactivate();
        }
    });
</script>
</body>
</html>
